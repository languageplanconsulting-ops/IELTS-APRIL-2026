<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 720" role="img" aria-labelledby="title desc">
  <title id="title">How a boat is lifted on the Falkirk Wheel</title>
  <desc id="desc">Cambridge-style diagram of the Falkirk Wheel boat lift with numbered labels for questions 21 to 27.</desc>
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#111"/>
    </marker>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#bbb" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="920" height="720" fill="#fff"/>
  <text x="460" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#111">How a boat is lifted on the Falkirk Wheel</text>

  <g transform="translate(300, 120)">
    <path d="M120 40 L420 40 L440 58 L100 58 Z" fill="#fff" stroke="#111" stroke-width="1.6"/>
    <path d="M120 40 L420 40" stroke="#111" stroke-width="2"/>
    <path d="M130 58 L410 58 L410 72 L130 72 Z" fill="#e8f4fc" stroke="#111" stroke-width="1.2"/>
    <text x="270" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Union Canal</text>

    <rect x="90" y="74" width="360" height="18" fill="url(#hatch)" stroke="#111" stroke-width="1.4"/>
    <rect x="170" y="92" width="200" height="14" fill="#ddd" stroke="#111" stroke-width="1.2"/>
    <text x="270" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#444">tunnel</text>

    <ellipse cx="270" cy="250" rx="34" ry="48" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="252" y="210" width="36" height="80" fill="#f5f5f5" stroke="#111" stroke-width="1.6"/>
    <circle cx="270" cy="250" r="16" fill="#fff" stroke="#111" stroke-width="1.8"/>
    <circle cx="270" cy="250" r="6" fill="#111"/>

    <path d="M270 210 L430 120 L450 138 L290 228 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <path d="M270 290 L110 380 L130 398 L290 308 Z" fill="#fff" stroke="#111" stroke-width="2"/>
    <path d="M270 210 L110 120 L130 138 L290 228 Z" fill="#fff" stroke="#111" stroke-width="1.4" stroke-dasharray="5 4" opacity="0.55"/>
    <path d="M270 290 L430 380 L450 398 L290 308 Z" fill="#fff" stroke="#111" stroke-width="1.4" stroke-dasharray="5 4" opacity="0.55"/>

    <path d="M410 108 L500 108 L515 148 L395 148 Z" fill="#e8f4fc" stroke="#111" stroke-width="1.8"/>
    <path d="M420 128 L490 128 L482 142 L428 142 Z" fill="#fff" stroke="#111" stroke-width="1.2"/>
    <path d="M430 136 L480 136 L475 140 L435 140 Z" fill="#555"/>
    <line x1="430" y1="136" x2="480" y2="136" stroke="#111" stroke-width="1"/>

    <path d="M40 348 L130 348 L145 388 L25 388 Z" fill="#e8f4fc" stroke="#111" stroke-width="1.8"/>

    <path d="M0 400 L540 400 L560 430 L-20 430 Z" fill="#e8f4fc" stroke="#111" stroke-width="1.6"/>
    <path d="M20 430 L520 430 L520 452 L20 452 Z" fill="#d7ebf7" stroke="#111" stroke-width="1.2"/>

    <rect x="118" y="368" width="10" height="34" fill="#fff" stroke="#111" stroke-width="1.6"/>
    <rect x="136" y="368" width="10" height="34" fill="#fff" stroke="#111" stroke-width="1.6"/>
    <line x1="124" y1="368" x2="124" y2="402" stroke="#111" stroke-width="1"/>
    <line x1="142" y1="368" x2="142" y2="402" stroke="#111" stroke-width="1"/>

    <rect x="118" y="318" width="22" height="10" rx="2" fill="#fff" stroke="#111" stroke-width="1.6"/>
    <line x1="129" y1="328" x2="129" y2="346" stroke="#111" stroke-width="1.4"/>

    <circle cx="360" cy="178" r="18" fill="#fff" stroke="#111" stroke-width="1.6"/>
    <circle cx="360" cy="178" r="10" fill="none" stroke="#111" stroke-width="1"/>
    <circle cx="360" cy="178" r="3" fill="#111"/>
    <circle cx="392" cy="196" r="12" fill="#fff" stroke="#111" stroke-width="1.4"/>
    <circle cx="392" cy="196" r="6" fill="none" stroke="#111" stroke-width="1"/>
    <circle cx="332" cy="196" r="8" fill="#fff" stroke="#111" stroke-width="1.4"/>
    <circle cx="332" cy="196" r="4" fill="none" stroke="#111" stroke-width="1"/>

    <rect x="-70" y="300" width="54" height="72" fill="#fff" stroke="#111" stroke-width="1.6"/>
    <rect x="-62" y="292" width="18" height="10" fill="#eee" stroke="#111" stroke-width="1.2"/>
    <rect x="-34" y="292" width="18" height="10" fill="#eee" stroke="#111" stroke-width="1.2"/>
    <line x1="-43" y1="300" x2="-43" y2="372" stroke="#111" stroke-width="1"/>
    <path d="M-70 336 L-16 336" stroke="#111" stroke-width="1" stroke-dasharray="4 3"/>
  </g>

  <text x="24" y="88" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111">
    <tspan>A pair of </tspan><tspan font-weight="700">21</tspan><tspan> ______ are lifted in order to shut out water from</tspan>
  </text>
  <text x="24" y="104" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111">canal basin</text>
  <line x1="210" y1="96" x2="418" y2="468" stroke="#111" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="300" y="88" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111">
    <tspan>A </tspan><tspan font-weight="700">22</tspan><tspan> ______ is taken out, enabling Wheel to rotate</tspan>
  </text>
  <line x1="430" y1="92" x2="448" y2="438" stroke="#111" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="620" y="88" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111">
    <tspan>Hydraulic motors drive </tspan><tspan font-weight="700">23</tspan><tspan> ______</tspan>
  </text>
  <line x1="700" y1="94" x2="574" y2="368" stroke="#111" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="620" y="300" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111">Boat is raised, floating in one of</text>
  <text x="620" y="316" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111">Wheel's two gondolas</text>
  <line x1="610" y1="308" x2="810" y2="248" stroke="#111" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="610" y1="308" x2="130" y2="468" stroke="#111" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="24" y="300" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111">
    <tspan font-weight="700">27</tspan><tspan> ______ raise boat 11 m to level of Union Canal</tspan>
  </text>
  <line x1="180" y1="306" x2="230" y2="418" stroke="#111" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="24" y="560" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111">Boat reaches top Wheel, then moves directly onto</text>
  <text x="24" y="576" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111">
    <tspan font-weight="700">25</tspan><tspan> ______</tspan>
  </text>
  <line x1="120" y1="568" x2="420" y2="178" stroke="#111" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="24" y="620" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111">Boat travels through tunnel beneath Roman</text>
  <text x="24" y="636" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111">
    <tspan font-weight="700">26</tspan><tspan> ______</tspan>
  </text>
  <line x1="130" y1="628" x2="390" y2="214" stroke="#111" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="560" y="620" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111">A range of different-sized</text>
  <text x="560" y="636" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#111">
    <tspan font-weight="700">24</tspan><tspan> ______ ensures boat keeps upright</tspan>
  </text>
  <line x1="550" y1="628" x2="660" y2="296" stroke="#111" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="700" y1="628" x2="692" y2="314" stroke="#111" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="760" y1="628" x2="632" y2="314" stroke="#111" stroke-width="1" marker-end="url(#arrow)"/>
</svg>
