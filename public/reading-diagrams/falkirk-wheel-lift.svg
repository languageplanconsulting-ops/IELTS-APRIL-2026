<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">How a boat is lifted on the Falkirk Wheel</title>
  <desc id="desc">Schematic of the Falkirk Wheel boat lift showing gates, clamp, axle, cogs, aqueduct, Roman wall, and locks.</desc>
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect width="720" height="520" fill="#f8fafc"/>
  <text x="360" y="32" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="18" font-weight="600" fill="#0f172a">How a boat is lifted on the Falkirk Wheel</text>

  <!-- Union canal (top) -->
  <rect x="80" y="52" width="560" height="36" rx="6" fill="url(#water)" stroke="#0369a1" stroke-width="1.5"/>
  <text x="360" y="74" text-anchor="middle" font-size="12" fill="#0c4a6e">Union Canal level</text>
  <rect x="300" y="88" width="120" height="14" fill="#64748b"/>
  <text x="360" y="118" text-anchor="middle" font-size="11" fill="#334155">24  aqueduct</text>

  <!-- Wheel structure -->
  <circle cx="360" cy="250" r="118" fill="none" stroke="url(#steel)" stroke-width="14"/>
  <circle cx="360" cy="250" r="28" fill="#cbd5e1" stroke="#475569" stroke-width="3"/>
  <text x="360" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">23 axle</text>

  <!-- Gondola (right, upper) -->
  <rect x="448" y="168" width="72" height="44" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
  <path d="M460 200 L508 200 L500 212 L468 212 Z" fill="#0ea5e9"/>
  <text x="484" y="232" text-anchor="middle" font-size="10" fill="#334155">gondola</text>

  <!-- Cogs -->
  <circle cx="478" cy="248" r="16" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
  <circle cx="242" cy="248" r="16" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
  <text x="360" y="200" text-anchor="middle" font-size="11" fill="#334155">23  cogs (gearing)</text>

  <!-- Lower canal basin -->
  <rect x="80" y="400" width="560" height="48" rx="6" fill="url(#water)" stroke="#0369a1" stroke-width="1.5"/>
  <text x="360" y="428" text-anchor="middle" font-size="12" fill="#0c4a6e">Forth &amp; Clyde Canal basin</text>

  <!-- Gondola lower -->
  <rect x="448" y="352" width="72" height="44" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
  <rect x="456" y="392" width="56" height="8" fill="#475569"/>
  <text x="484" y="388" text-anchor="middle" font-size="10" fill="#b91c1c" font-weight="600">21 gates</text>

  <!-- Clamp callout -->
  <rect x="528" y="318" width="52" height="20" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="554" y="332" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">22 clamp</text>
  <line x1="520" y1="330" x2="500" y2="340" stroke="#d97706" stroke-width="1.5"/>

  <!-- Roman wall + tunnel -->
  <rect x="120" y="448" width="180" height="36" fill="#78716c" stroke="#44403c" stroke-width="2"/>
  <text x="210" y="470" text-anchor="middle" font-size="11" fill="#fafaf9">25  wall (Antonine)</text>
  <rect x="150" y="456" width="120" height="20" fill="#57534e"/>
  <text x="210" y="498" text-anchor="middle" font-size="10" fill="#334155">tunnel beneath</text>

  <!-- Locks -->
  <rect x="480" y="448" width="100" height="40" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <rect x="492" y="440" width="24" height="12" fill="#94a3b8"/>
  <rect x="544" y="440" width="24" height="12" fill="#94a3b8"/>
  <text x="530" y="498" text-anchor="middle" font-size="11" fill="#334155">27  locks (+11 m)</text>

  <!-- Flow arrows -->
  <path d="M360 140 L360 168" stroke="#0f172a" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M360 320 L360 348" stroke="#0f172a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="24" y="88" width="200" height="108" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="36" y="108" font-size="11" font-weight="600" fill="#0f172a">Label with ONE WORD:</text>
  <text x="36" y="126" font-size="10" fill="#475569">21 gates · 22 clamp · 23 axle</text>
  <text x="36" y="142" font-size="10" fill="#475569">24 cogs · 25 aqueduct · 26 wall</text>
  <text x="36" y="158" font-size="10" fill="#475569">27 locks</text>
  <text x="36" y="182" font-size="9" fill="#64748b" font-style="italic">Numbers match questions 2127</text>
</svg>
